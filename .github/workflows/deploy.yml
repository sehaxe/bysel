name: Deploy Docs

on:
  push:
    branches: [ main, master ] # 🎯 Поддержка обеих веток (и main, и master)
    paths:
      - 'site/**' # Запускать сборку только при изменении документации
  workflow_dispatch: # 🎯 Позволяет запускать сборку вручную одной кнопкой на GitHub!

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: cd site && bun install
      - name: Build docs
        run: cd site && bun run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4