      n_heads: 3
      expert_hidden: 384
      num_experts: 4
      top_k: 1
      vocab_size: 326
      selective_backward: false
      backward_ratio: 1.0
    data:
      data_path: "data_train"
      chunk_size: 512
      batch_size: 2048
    training:
      max_steps: 2000
      warmup_steps: 100
      min_lr_ratio: 0.1
      learning_rate_muon: 0.003
      learning_rate_adamw: 0.0003
      weight_decay: 0.1
      grad_accum_steps: 1
      checkpoint_interval: 500
      use_dispersion_loss: false
      dispersion_weight: 0.1
      dispersion_temperature: 2.0

  scale_xl:
    model:
      d_model: 256
      n_layers: 8
