  # ═══════════════════════════════════════════════════════════════
  # noc — 18-hour overnight profile (~75M params)
  # Optimized for RTX 5060 Ti 16 GB, trains to optimal in ~16h
  # ═══════════════════════════════════════════════════════════════
  noc:
    model:
      d_model: 448           # ~75M params (448/384)^2 * 52.8M ≈ 72M
      n_layers: 8
      n_heads: 7             # 448 / 7 = 64 per head
      expert_hidden: 896     # 2 * d_model
      num_experts: 4
      top_k: 1
      vocab_size: 326
      selective_backward: true
      backward_ratio: 0.5
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 32         # Slightly smaller batch for larger model
    training:
      max_steps: "auto"      # Auto-computed from Busel Scaling Laws
